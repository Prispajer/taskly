version: '3.4'

services:
  postgres:
    image: postgres:latest
    container_name: taskly-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: randompassword
      POSTGRES_DB: Taskly
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  taskly.api:
    image: tasklyapi
    build:
      context: .
      dockerfile: ./Dockerfile
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__ConnectionString=Host=postgres;Port=5432;Database=Taskly;Username=postgres;Password=randompassword
    depends_on:
      - postgres

volumes:
  postgres_data:
